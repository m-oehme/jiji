# Jiji default configuration
# Copy to ~/.config/jiji/config.toml and customize as needed.

[ui]
theme = "default"
list_ratio = 30                   # Percentage width for issue list pane (1-99)
detail_layout = "stacked"         # "stacked" or "side-by-side"
editor = ""                       # External editor. Falls back to $EDITOR, then "vi"

[ui.fields]
list = ["key", "summary", "assignee", "priority"]

[[tabs]]
name = "All Issues"
jql = "ORDER BY updated DESC"

# [[tabs]]
# name = "My Issues"
# jql = "assignee = currentUser() AND resolution = Unresolved ORDER BY updated DESC"

# [[tabs]]
# name = "Sprint"
# jql = "sprint in openSprints() AND project = MYPROJ ORDER BY rank ASC"

[keybindings]
up = ["k", "up"]
down = ["j", "down"]
tab_next = ["l", "right"]
tab_prev = ["h", "left"]
pane_switch = ["tab"]
top = ["g"]
bottom = ["G"]
confirm = ["enter"]
focus_jql = ["/"]
cancel = ["esc"]
quit = ["q"]
help = ["?"]
transition = ["t"]
comment = ["c"]
labels = ["L"]
summary = ["s"]
edit = ["e"]
refresh = ["r"]

[theme]
primary = "#7C3AED"
secondary = "#06B6D4"
border = "#404040"
border_focused = "#7C3AED"
text = "#E4E4E7"
text_dim = "#71717A"
success = "#22C55E"
warning = "#F59E0B"
error = "#EF4444"

[cache]
issue_capacity = 50
comment_capacity = 20
prefetch_count = 10
